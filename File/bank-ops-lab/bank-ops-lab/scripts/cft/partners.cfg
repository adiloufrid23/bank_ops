# ═══════════════════════════════════════════════════════════════════════════
# partners.cfg — Configuration des partenaires CFT (Axway Transfer)
# Format : Définition des flux de transfert avec les partenaires bancaires
# ═══════════════════════════════════════════════════════════════════════════

# ─── Partenaire 1 : Banque Centrale Européenne (BCE) ────────────────────
CFTPART ID       = BCE,
         NSPART   = BCE_PROD,
         PROT     = PESIT,
         SAP      = 1761,
         HOST     = cft.bce.europa.eu,
         SSL      = REQUIRED,
         SSLCIPH  = TLS_AES_256_GCM_SHA384,
         COMMENT  = "Banque Centrale Européenne - Reporting réglementaire"

CFTSEND  ID       = BCE_COREP,
         PART     = BCE,
         IDF      = COREP_MONTHLY,
         FNAME    = /opt/bank-ops/data/outgoing/corep_&FDATE..xml,
         FTYPE    = T,
         NFNAME   = COREP_&FDATE._BANKID.xml,
         COMMENT  = "Envoi rapport COREP mensuel"

CFTRECV  ID       = BCE_REFDATA,
         PART     = BCE,
         IDF      = REF_DATA,
         FNAME    = /opt/bank-ops/data/incoming/refdata_&FDATE..csv,
         FTYPE    = T,
         COMMENT  = "Réception données de référence BCE"

# ─── Partenaire 2 : STET (Compensation SEPA) ────────────────────────────
CFTPART ID       = STET,
         NSPART   = STET_PROD,
         PROT     = PESIT,
         SAP      = 1762,
         HOST     = cft.stet.eu,
         SSL      = REQUIRED,
         SSLCIPH  = TLS_AES_256_GCM_SHA384,
         COMMENT  = "STET - Chambre de compensation SEPA"

CFTSEND  ID       = STET_SCT,
         PART     = STET,
         IDF      = SEPA_CREDIT_TRANSFER,
         FNAME    = /opt/bank-ops/data/outgoing/sct_&FDATE..xml,
         FTYPE    = T,
         NFNAME   = SCT_&FDATE._BANKID.xml,
         COMMENT  = "Envoi virements SEPA SCT"

CFTSEND  ID       = STET_SDD,
         PART     = STET,
         IDF      = SEPA_DIRECT_DEBIT,
         FNAME    = /opt/bank-ops/data/outgoing/sdd_&FDATE..xml,
         FTYPE    = T,
         NFNAME   = SDD_&FDATE._BANKID.xml,
         COMMENT  = "Envoi prélèvements SEPA SDD"

CFTRECV  ID       = STET_ACKR,
         PART     = STET,
         IDF      = ACK_REPORT,
         FNAME    = /opt/bank-ops/data/incoming/stet_ack_&FDATE..xml,
         FTYPE    = T,
         COMMENT  = "Réception acquittements STET"

# ─── Partenaire 3 : Swift (Messages financiers) ─────────────────────────
CFTPART ID       = SWIFT,
         NSPART   = SWIFT_FIN,
         PROT     = SFTP,
         SAP      = 22,
         HOST     = sftp.swift.com,
         SSL      = REQUIRED,
         COMMENT  = "SWIFT - Messages financiers internationaux"

CFTSEND  ID       = SWIFT_MT103,
         PART     = SWIFT,
         IDF      = MT103_TRANSFER,
         FNAME    = /opt/bank-ops/data/outgoing/mt103_&FDATE..fin,
         FTYPE    = T,
         COMMENT  = "Envoi virements internationaux MT103"

CFTRECV  ID       = SWIFT_MT940,
         PART     = SWIFT,
         IDF      = MT940_STATEMENT,
         FNAME    = /opt/bank-ops/data/incoming/mt940_&FDATE..fin,
         FTYPE    = T,
         COMMENT  = "Réception relevés de compte MT940"
