# ═══════════════════════════════════════════════════════════════════════════
# transfer_daily.cfg — Planning des transferts quotidiens
# Ce fichier est lu par les scripts d'orchestration pour déterminer
# les flux à exécuter chaque jour
# ═══════════════════════════════════════════════════════════════════════════

# Format : FLOW_ID|PARTNER|DIRECTION|SCHEDULE|PRIORITY|DESCRIPTION
# SCHEDULE : DAILY, WEEKLY(day), MONTHLY(day), EOM (End of Month)

# ─── Flux quotidiens ────────────────────────────────────────────────────
STET_SCT_OUT|STET|OUT|DAILY|HIGH|Virements SEPA Credit Transfer
STET_SDD_OUT|STET|OUT|DAILY|HIGH|Prélèvements SEPA Direct Debit
STET_ACK_IN|STET|IN|DAILY|HIGH|Acquittements STET
SWIFT_MT103_OUT|SWIFT|OUT|DAILY|MEDIUM|Virements internationaux MT103
SWIFT_MT940_IN|SWIFT|IN|DAILY|MEDIUM|Relevés de compte MT940
BCE_REFDATA_IN|BCE|IN|DAILY|LOW|Données de référence BCE

# ─── Flux mensuels ──────────────────────────────────────────────────────
BCE_COREP_OUT|BCE|OUT|EOM|CRITICAL|Rapport réglementaire COREP
BCE_FINREP_OUT|BCE|OUT|EOM|CRITICAL|Rapport réglementaire FINREP

# ─── Flux hebdomadaires ─────────────────────────────────────────────────
SWIFT_MT942_IN|SWIFT|IN|WEEKLY(FRI)|LOW|Relevés intermédiaires MT942
