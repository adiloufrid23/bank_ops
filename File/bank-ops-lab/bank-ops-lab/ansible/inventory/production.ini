###############################################################################
# production.ini — Inventaire Ansible Production
###############################################################################

[webservers]
srvprod-web01 ansible_host=10.0.1.10
srvprod-web02 ansible_host=10.0.1.11

[appservers]
srvprod-app01 ansible_host=10.0.2.10 websphere_node=node01
srvprod-app02 ansible_host=10.0.2.11 websphere_node=node02

[dbservers]
srvprod-db01 ansible_host=10.0.3.10 pg_role=primary
srvprod-db02 ansible_host=10.0.3.11 pg_role=replica

[batchservers]
srvprod-batch01 ansible_host=10.0.4.10

[k8s_masters]
srvprod-k8s-master01 ansible_host=10.0.5.10

[k8s_workers]
srvprod-k8s-worker01 ansible_host=10.0.5.20
srvprod-k8s-worker02 ansible_host=10.0.5.21
srvprod-k8s-worker03 ansible_host=10.0.5.22

[monitoring]
srvprod-mon01 ansible_host=10.0.6.10

# Groupes logiques
[production:children]
webservers
appservers
dbservers
batchservers
k8s_masters
k8s_workers
monitoring

[production:vars]
env=production
domain=bankops.internal.prod
ntp_server=ntp.internal.prod
dns_servers=["10.0.0.2", "10.0.0.3"]
